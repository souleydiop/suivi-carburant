// GOOGLE DRIVE SYNC
// ═══════════════════════════════════════════════════════════════════════════════
const DRIVE_CLIENT_ID = '354411309659-svp53kob700s7r8jgti4odovle7cu7tt.apps.googleusercontent.com';
const DRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE_NAME = 'finance-data.json';

let driveAccessToken = null;
let driveFileId = null;
let driveSyncTimer = null;
let lastSyncTime = null;

function updateDriveStatus(state, msg) {
  const dot = document.getElementById('drive-dot');
  const label = document.getElementById('drive-label');
  if (!dot || !label) return;
  dot.className = 'drive-dot';
  if (state === 'connected') { dot.classList.add('connected'); label.style.color = 'var(--green)'; }
  else if (state === 'syncing') { dot.classList.add('syncing'); label.style.color = 'var(--yellow)'; }
  else if (state === 'error') { dot.classList.add('error'); label.style.color = 'var(--red)'; }
  else { label.style.color = 'var(--text3)'; }
  label.textContent = msg;
}

// ── Connexion Google ──────────────────────────────────────────────────────────
function connectDrive() {
  if (!window.google) { showToast('⚠️ Google API non chargée'); return; }
  updateDriveStatus('syncing', 'Connexion...');

  const client = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: DRIVE_SCOPES,
    callback: async (response) => {
      if (response.error) {
        updateDriveStatus('error', 'Erreur connexion');
        showToast('❌ Connexion Google échouée');
        return;
      }
      driveAccessToken = response.access_token;
      localStorage.setItem('drive_token', driveAccessToken);
      updateDriveStatus('connected', 'Connecté ✓');
      showToast('✅ Google Drive connecté !');
      // Try to load existing data from Drive
      await loadFromDrive();
      // Start auto sync every 24h
      startAutoSync();
    },
  });
  client.requestAccessToken();
}

function disconnectDrive() {
  driveAccessToken = null;
  driveFileId = null;
  localStorage.removeItem('drive_token');
  localStorage.removeItem('drive_file_id');
  if (driveSyncTimer) clearInterval(driveSyncTimer);
  updateDriveStatus('', 'Non connecté');
  showToast('🔌 Drive déconnecté');
}

// ── Save to Drive ─────────────────────────────────────────────────────────────
async function saveToDrive() {
  if (!driveAccessToken) return;
  updateDriveStatus('syncing', 'Sauvegarde...');
  try {
    const payload = JSON.stringify({ ...appData, savedAt: new Date().toISOString() });
    const blob = new Blob([payload], { type: 'application/json' });

    if (!driveFileId) {
      // Search for existing file first
      const searchRes = await fetch(
        `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'`,
        { headers: { Authorization: `Bearer ${driveAccessToken}` } }
      );
      const searchData = await searchRes.json();
      if (searchData.files && searchData.files.length > 0) {
        driveFileId = searchData.files[0].id;
        localStorage.setItem('drive_file_id', driveFileId);
      }
    }

    if (driveFileId) {
      // Update existing file
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${driveAccessToken}`, 'Content-Type': 'application/json' },
        body: payload,
      });
    } else {
      // Create new file in appDataFolder
      const meta = JSON.stringify({ name: DRIVE_FILE_NAME, parents: ['appDataFolder'] });
      const form = new FormData();
      form.append('metadata', new Blob([meta], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { Authorization: `Bearer ${driveAccessToken}` },
        body: form,
      });
      const data = await res.json();
      driveFileId = data.id;
      localStorage.setItem('drive_file_id', driveFileId);
    }

    lastSyncTime = new Date();
    const timeStr = lastSyncTime.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
    updateDriveStatus('connected', `Sync ${timeStr} ✓`);
  } catch(e) {
    console.error('Drive save error:', e);
    updateDriveStatus('error', 'Erreur sync');
  }
}

// ── Load from Drive ───────────────────────────────────────────────────────────
async function loadFromDrive() {
  if (!driveAccessToken) return;
  updateDriveStatus('syncing', 'Chargement...');
  try {
    const fileId = driveFileId || localStorage.getItem('drive_file_id');
    if (!fileId) {
      // Search for file
      const searchRes = await fetch(
        `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'`,
        { headers: { Authorization: `Bearer ${driveAccessToken}` } }
      );
      const searchData = await searchRes.json();
      if (!searchData.files || searchData.files.length === 0) {
        updateDriveStatus('connected', 'Aucune donnée Drive');
        // First time - save current data
        await saveToDrive();
        return;
      }
      driveFileId = searchData.files[0].id;
      localStorage.setItem('drive_file_id', driveFileId);
    }

    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${driveFileId || fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${driveAccessToken}` } }
    );
    const driveData = await res.json();

    if (driveData && driveData.bancaire) {
      // Merge: use Drive data if more recent
      const driveTime = driveData.savedAt ? new Date(driveData.savedAt) : new Date(0);
      const localTime = localStorage.getItem('mf_last_save') ? new Date(localStorage.getItem('mf_last_save')) : new Date(0);

      if (driveTime > localTime) {
        appData = driveData;
        delete appData.savedAt;
        saveData();
        render();
        showToast('☁️ Données chargées depuis Drive');
      } else {
        showToast('✅ Données locales plus récentes');
      }
      updateDriveStatus('connected', 'Drive connecté ✓');
    }
  } catch(e) {
    console.error('Drive load error:', e);
    updateDriveStatus('error', 'Erreur chargement');
  }
}

// ── Auto sync every 24h ───────────────────────────────────────────────────────
function startAutoSync() {
  if (driveSyncTimer) clearInterval(driveSyncTimer);
  // Sync immediately
  saveToDrive();
  // Then every 24h
  driveSyncTimer = setInterval(() => {
    saveToDrive();
  }, 24 * 60 * 60 * 1000);
}

// ── Save timestamp on every saveData ─────────────────────────────────────────
const _origSaveData = saveData;
// Patch saveData to also trigger Drive sync
function saveData() {
  localStorage.setItem('mf_data', JSON.stringify(appData));
  localStorage.setItem('mf_last_save', new Date().toISOString());
  // Debounce Drive sync (wait 3s after last change)
  if (driveAccessToken) {
    clearTimeout(window._driveSaveTimer);
    window._driveSaveTimer = setTimeout(saveToDrive, 3000);
  }
}

// ── Restore token on app start ────────────────────────────────────────────────
function restoreDriveSession() {
  const token = localStorage.getItem('drive_token');
  const fileId = localStorage.getItem('drive_file_id');
  if (token) {
    driveAccessToken = token;
    if (fileId) driveFileId = fileId;
    updateDriveStatus('connected', 'Drive connecté ✓');
    startAutoSync();
  }
}


// ═══════════════════════════════════════════════════════════════════════════════
// FIREBASE — Auth + Firestore
// ═══════════════════════════════════════════════════════════════════════════════
// NOTE: Remplace ces valeurs par ta config Firebase
const FIREBASE_CONFIG = {
  apiKey: "FIREBASE_API_KEY",
  authDomain: "FIREBASE_AUTH_DOMAIN",
  projectId: "FIREBASE_PROJECT_ID",
  storageBucket: "FIREBASE_STORAGE_BUCKET",
  messagingSenderId: "FIREBASE_SENDER_ID",
  appId: "FIREBASE_APP_ID"
};

let firebaseApp = null;
let firebaseAuth = null;
let firebaseDb = null;
let currentUser = null;
let offlineMode = false;

function initFirebase() {
  try {
    if (typeof firebase === 'undefined') { console.log('[FB] Firebase not loaded'); return false; }
    if (!firebaseApp) {
      firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
      firebaseAuth = firebase.auth();
      firebaseDb = firebase.firestore();
      firebaseDb.enablePersistence().catch(e => console.log('[FB] Persistence:', e));
    }
    return true;
  } catch(e) { console.error('[FB] Init error:', e); return false; }
}

// ── Auth flows ────────────────────────────────────────────────────────────────
function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'none';
}

function loginEmail() {
  if (!initFirebase()) { toggleOfflineMode(); return; }
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) { document.getElementById('login-error').textContent = 'Email et mot de passe requis'; return; }
  document.getElementById('login-error').textContent = 'Connexion...';
  firebaseAuth.signInWithEmailAndPassword(email, pass)
    .then(onAuthSuccess)
    .catch(e => { document.getElementById('login-error').textContent = getAuthError(e.code); });
}

function registerEmail() {
  if (!initFirebase()) { toggleOfflineMode(); return; }
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) { document.getElementById('login-error').textContent = 'Email et mot de passe requis'; return; }
  if (pass.length < 6) { document.getElementById('login-error').textContent = 'Mot de passe : 6 caractères minimum'; return; }
  document.getElementById('login-error').textContent = 'Création du compte...';
  firebaseAuth.createUserWithEmailAndPassword(email, pass)
    .then(onAuthSuccess)
    .catch(e => { document.getElementById('login-error').textContent = getAuthError(e.code); });
}

function loginGoogle() {
  if (!initFirebase()) { toggleOfflineMode(); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  firebaseAuth.signInWithPopup(provider)
    .then(onAuthSuccess)
    .catch(e => { document.getElementById('login-error').textContent = getAuthError(e.code); });
}

function onAuthSuccess(result) {
  currentUser = result.user;
  offlineMode = false;
  document.getElementById('login-screen').style.display = 'none';
  // Show user info in header
  const ui = document.getElementById('user-info');
  if (ui) { ui.style.display = 'block'; ui.textContent = currentUser.email || currentUser.displayName || 'Connecté'; }
  const lb = document.getElementById('logout-btn');
  if (lb) lb.style.display = 'block';
  // Load user data from Firestore
  loadFromFirestore().then(() => {
    document.getElementById('pin-screen').style.display = 'flex';
  });
}

function logoutUser() {
  if (firebaseAuth) {
    firebaseAuth.signOut().then(() => {
      currentUser = null;
      const ui = document.getElementById('user-info');
      if (ui) { ui.style.display = 'none'; ui.textContent = ''; }
      const lb = document.getElementById('logout-btn');
      if (lb) lb.style.display = 'none';
      lock();
      showLoginScreen();
      showToast('👋 Déconnecté');
    });
  }
}

function toggleOfflineMode() {
  offlineMode = true;
  currentUser = null;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  showToast('📱 Mode local activé');
}

function getAuthError(code) {
  const errors = {
    'auth/user-not-found': 'Compte introuvable',
    'auth/wrong-password': 'Mot de passe incorrect',
    'auth/email-already-in-use': 'Email déjà utilisé',
    'auth/invalid-email': 'Email invalide',
    'auth/weak-password': 'Mot de passe trop faible',
    'auth/network-request-failed': 'Erreur réseau',
    'auth/popup-closed-by-user': 'Connexion annulée',
  };
  return errors[code] || 'Erreur: ' + code;
}

// ── Firestore sync ─────────────────────────────────────────────────────────────
async function saveToFirestore() {
  if (!currentUser || !firebaseDb || offlineMode) return;
  try {
    await firebaseDb.collection('users').doc(currentUser.uid).set({
      data: appData,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      email: currentUser.email,
    });
    const timeStr = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    updateDriveStatus('connected', 'Firebase ' + timeStr + ' ✓');
  } catch(e) {
    console.error('[FB] Save error:', e);
    updateDriveStatus('error', 'Erreur sauvegarde');
  }
}

async function loadFromFirestore() {
  if (!currentUser || !firebaseDb) return;
  try {
    updateDriveStatus('syncing', 'Chargement...');
    const doc = await firebaseDb.collection('users').doc(currentUser.uid).get();
    if (doc.exists && doc.data().data) {
      const fbData = doc.data().data;
      const fbTime = doc.data().updatedAt ? doc.data().updatedAt.toDate() : new Date(0);
      const localTime = localStorage.getItem('mf_last_save') ? new Date(localStorage.getItem('mf_last_save')) : new Date(0);
      if (fbTime > localTime) {
        appData = fbData;
        saveData();
        showToast('☁️ Données chargées depuis Firebase');
      }
    } else {
      // First time — save local data to Firestore
      await saveToFirestore();
    }
    updateDriveStatus('connected', 'Firebase ✓');
  } catch(e) {
    console.error('[FB] Load error:', e);
    updateDriveStatus('error', 'Erreur chargement');
  }
}

// ── Patch saveData to sync Firestore ──────────────────────────────────────────
const _origSaveDataFB = saveData;
function saveData() {
  localStorage.setItem('mf_data', JSON.stringify(appData));
  localStorage.setItem('mf_last_save', new Date().toISOString());
  // Debounce Firestore sync
  if (currentUser && !offlineMode) {
    clearTimeout(window._fbSaveTimer);
    window._fbSaveTimer = setTimeout(saveToFirestore, 2000);
  }
  // Drive sync
  if (driveAccessToken) {
    clearTimeout(window._driveSaveTimer);
    window._driveSaveTimer = setTimeout(saveToDrive, 3000);
  }
}

// ── Auth state listener ───────────────────────────────────────────────────────
function initAuthListener() {
  if (!initFirebase()) return;
  firebaseAuth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      const ui = document.getElementById('user-info');
      if (ui) { ui.style.display = 'block'; ui.textContent = user.email || user.displayName; }
      const lb = document.getElementById('logout-btn');
      if (lb) lb.style.display = 'block';
      // Already on pin screen — sync in background
      loadFromFirestore();
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
console.log('Finance v3.0.0 — PWA Ready');
restoreDriveSession();
initAuthListener();
</script>
