<script>
// ============ STATE ============
const SK='fuel_v4';
let D={vehicles:[],entries:[],maints:[],journal:[],budget:{},gdriveToken:null};
let curVeh=null, curMonth=new Date().toISOString().substring(0,7), selCatVal='essence', editVehId=null;

function load(){try{const s=localStorage.getItem(SK);if(s)D=JSON.parse(s);}catch(e){}
  if(!D.vehicles)D.vehicles=[];if(!D.entries)D.entries=[];if(!D.maints)D.maints=[];
  if(!D.journal)D.journal=[];if(!D.budget)D.budget={};
  if(D.vehicles.length===0){D.vehicles.push({id:Date.now(),name:'Mon Vehicule',brand:'',model:'',plate:'',fuel:'essence',budget:0,conso:0});persist();}
  curVeh=D.vehicles[0].id;
}
function persist(){localStorage.setItem(SK,JSON.stringify(D));}
function fmtN(n){return Math.abs(n).toLocaleString('fr-FR');}
function fmtD(d){return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
function cv(){return D.vehicles.find(v=>v.id===curVeh)||D.vehicles[0];}
function cEntries(){return D.entries.filter(e=>e.vehId===curVeh);}

;
  for(var i=0;i<4;i++){
    var d=document.getElementById('pd'+i);
    if(!d)return;
  }
}

  else{
    dots.classList.add('shake');
  }
}
  
  document.getElementById('app').style.display='block';
  
}

  } else {
  }
}

// ============ VEHICLE BAR ============
function renderVBar(){
  document.getElementById('vbar').innerHTML=D.vehicles.map(v=>`
    <div class="vchip ${v.id===curVeh?'active':''}" onclick="selVeh(${v.id})">${v.name}${v.brand?' · '+v.brand:''}</div>`).join('');
  const v=cv();
  document.getElementById('veh-title').textContent=v?v.name+(v.plate?' — '+v.plate:''):'Mon Vehicule';
}
function selVeh(id){curVeh=id;renderVBar();renderAll();}

// ============ SCORE ============
function calcScore(){
  const ents=cEntries();if(ents.length<2)return null;
  const consos=getConsos(ents);if(!consos.length)return null;
  const v=cv();
  const avg=consos.reduce((s,c)=>s+c.conso,0)/consos.length;
  const target=v.conso||9;
  const budgetMth=v.budget||0;
  const now=new Date().toISOString().substring(0,7);
  const spent=ents.filter(e=>e.date.startsWith(now)).reduce((s,e)=>s+e.total,0);
  let s=100;
  if(avg>target*1.3)s-=40; else if(avg>target*1.1)s-=20; else if(avg<=target*0.9)s+=5;
  if(budgetMth>0){const r=spent/budgetMth;if(r>1.2)s-=30;else if(r>1)s-=15;else if(r<0.8)s+=5;}
  return Math.max(0,Math.min(100,Math.round(s)));
}
function renderScore(){
  const s=calcScore();
  const sc=document.getElementById('score-card');
  if(s===null){sc.style.display='none';return;}
  sc.style.display='flex';
  document.getElementById('score-num').textContent=s;
  let title,sub,color;
  if(s>=85){title='Excellent ✨';sub='Consommation optimale';color='#7dca7d';}
  else if(s>=65){title='Bon 👍';sub='Quelques améliorations possibles';color='var(--acc)';}
  else if(s>=40){title='Moyen ⚠️';sub='Budget ou conso élevés';color='#f5a623';}
  else{title='Critique 🔴';sub='Budget dépassé, conso excessive';color='var(--red)';}
  document.getElementById('score-title').textContent=title;
  document.getElementById('score-sub').textContent=sub;
  document.querySelector('.score-circle').style.borderColor=color;
  document.getElementById('score-num').style.color=color;
}

// ============ ALERTS ============
function renderAlerts(){
  const alerts=[];const v=cv();const ents=cEntries();
  const now=new Date().toISOString().substring(0,7);
  const mSpent=ents.filter(e=>e.date.startsWith(now)).reduce((s,e)=>s+e.total,0);
  if(v.budget>0&&mSpent>v.budget*0.9) alerts.push({type:mSpent>v.budget?'danger':'warn',icon:'💰',msg:mSpent>v.budget?`Budget dépassé ! ${fmtN(mSpent)} / ${fmtN(v.budget)} FCFA`:`Budget à ${Math.round(mSpent/v.budget*100)}% — ${fmtN(v.budget-mSpent)} FCFA restants`});
  const maints=D.maints.filter(m=>m.vehId===curVeh);
  const today=new Date().toISOString().split('T')[0];
  maints.forEach(m=>{if(m.nextDate&&m.nextDate<=today) alerts.push({type:'danger',icon:'🔧',msg:`${MAINT_LABELS[m.type]||m.type} : échéance dépassée !`});
    else if(m.nextDate){const diff=(new Date(m.nextDate)-new Date())/(1000*60*60*24);if(diff<=30) alerts.push({type:'warn',icon:'⚠️',msg:`${MAINT_LABELS[m.type]||m.type} dans ${Math.round(diff)} jours`});}});
  const consos=getConsos(ents);
  if(consos.length>0){const avg=consos.slice(-3).reduce((s,c)=>s+c.conso,0)/Math.min(3,consos.length);if(avg>12) alerts.push({type:'warn',icon:'⛽',msg:`Consommation élevée : ${avg.toFixed(1)} L/100km (moy. 3 derniers pleins)`});}
  document.getElementById('alerts-zone').innerHTML=alerts.slice(0,3).map(a=>`<div class="alert-banner ${a.type}"><span class="alert-icon">${a.icon}</span><span>${a.msg}</span></div>`).join('');
}

// ============ STATS UTILS ============
function getConsos(ents){
  const s=[...ents].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const r=[];
  for(let i=1;i<s.length;i++){const p=s[i-1],c=s[i],d=c.km-p.km;if(d>0)r.push({...c,dist:d,conso:(c.liters/d)*100});}
  return r;
}

// ============ DASHBOARD ============
function renderDashboard(){
  const ents=cEntries();
  const total=ents.reduce((s,e)=>s+e.total,0);
  const liters=ents.reduce((s,e)=>s+e.liters,0);
  const avgPrice=liters>0?total/liters:0;
  const consos=getConsos(ents);
  const avgConso=consos.length>0?consos.reduce((s,c)=>s+c.conso,0)/consos.length:null;
  const sorted=[...ents].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const dist=sorted.length>1?sorted[sorted.length-1].km-sorted[0].km:0;
  const cc=avgConso?(avgConso>10?'var(--red)':'#7dca7d'):'var(--txt3)';
  const last=sorted[sorted.length-1];
  const v=cv();
  const now=new Date().toISOString().substring(0,7);
  const mSpent=ents.filter(e=>e.date.startsWith(now)).reduce((s,e)=>s+e.total,0);
  const mLiters=ents.filter(e=>e.date.startsWith(now)).reduce((s,e)=>s+e.liters,0);

  // Forecast fin de mois
  const today=new Date();
  const daysLeft=new Date(today.getFullYear(),today.getMonth()+1,0).getDate()-today.getDate();
  const daysGone=today.getDate();
  const forecastSpend=daysGone>0?Math.round(mSpent/daysGone*(daysGone+daysLeft)):0;

  document.getElementById('tab-dashboard').innerHTML=`
    <div class="grid2" style="margin-bottom:10px">
      <div class="mini"><div class="mini-lbl">Total dépensé</div><div class="mini-val" style="color:var(--acc)">${fmtN(Math.round(total))}</div><div class="mini-unit">FCFA</div></div>
      <div class="mini"><div class="mini-lbl">Litres cumulés</div><div class="mini-val" style="color:var(--blu)">${liters.toFixed(1)}</div><div class="mini-unit">litres</div></div>
      <div class="mini"><div class="mini-lbl">Conso moyenne</div><div class="mini-val" style="color:${cc}">${avgConso?avgConso.toFixed(1):'--'}</div><div class="mini-unit">L/100km</div></div>
      <div class="mini"><div class="mini-lbl">Distance totale</div><div class="mini-val" style="color:var(--pur)">${fmtN(dist)}</div><div class="mini-unit">km parcourus</div></div>
    </div>
    <div class="mini" style="margin-bottom:10px"><div class="mini-lbl">Prix moyen au litre</div><div style="display:flex;align-items:baseline;gap:8px"><span class="mono" style="font-size:24px;font-weight:700">${avgPrice?avgPrice.toFixed(0):'--'}</span><span style="font-size:11px;color:var(--txt2)">FCFA/L</span></div></div>
    ${last?`<div class="mini" style="margin-bottom:10px"><div class="mini-lbl">Dernier plein</div><div style="display:flex;justify-content:space-between;align-items:baseline"><span class="mono" style="font-size:13px;font-weight:600">${fmtD(last.date)}</span><span class="mono" style="color:var(--acc)">${fmtN(Math.round(last.total))} FCFA</span></div><div style="font-size:10px;color:var(--txt3);margin-top:3px">${fmtN(last.km)} km · ${last.liters} L · ${fmtN(last.pricePerLiter)} F/L</div></div>`:''}
    <div class="forecast-card">
      <div class="forecast-lbl">Prévision fin de mois</div>
      <div class="forecast-row"><span>Dépensé ce mois</span><span class="mono" style="color:var(--acc)">${fmtN(mSpent)} FCFA</span></div>
      <div class="forecast-row"><span>Litres ce mois</span><span class="mono" style="color:var(--blu)">${mLiters.toFixed(1)} L</span></div>
      <div class="forecast-row"><span>Jours restants</span><span class="mono">${daysLeft} jours</span></div>
      ${v.budget>0?`<div class="forecast-row"><span>Budget mensuel</span><span class="mono">${fmtN(v.budget)} FCFA</span></div>`:''}
      <div class="forecast-row"><span>Projection fin du mois</span><span class="mono" style="color:${v.budget>0&&forecastSpend>v.budget?'var(--red)':'#7dca7d'}">${fmtN(forecastSpend)} FCFA</span></div>
    </div>
    ${ents.length===0?'<div class="empty"><div class="empty-icon">⛽</div><div>Ajoutez votre premier plein avec +</div></div>':''}
  `;
  renderScore();renderAlerts();
}

// ============ HISTORY ============
function renderHistory(){
  const ents=cEntries().filter(e=>e.date.startsWith(curMonth)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const allSorted=cEntries().sort((a,b)=>new Date(a.date)-new Date(b.date));
  const [yr,mo]=curMonth.split('-').map(Number);
  const moLbl=new Date(yr,mo-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const mInc=ents.reduce((s,e)=>s+e.total,0);
  const mL=ents.reduce((s,e)=>s+e.liters,0);

  let html=`
    <div class="export-row">
      <button class="btn-exp" onclick="exportCSV()">📄 CSV</button>
      <button class="btn-exp" onclick="exportPDF()">📑 PDF</button>
    </div>
    <div class="mnav">
      <button class="mnav-btn" onclick="prevMonth()">◀</button>
      <span class="mnav-lbl">${moLbl}</span>
      <button class="mnav-btn" onclick="nextMonth()">▶</button>
    </div>`;

  if(!ents.length){html+='<div class="empty"><div class="empty-icon">📋</div><div>Aucun plein ce mois</div></div>';document.getElementById('tab-history').innerHTML=html;return;}

  const groups={};
  ents.forEach(e=>{(groups[e.date]=groups[e.date]||[]).push(e);});
  Object.keys(groups).sort((a,b)=>new Date(b)-new Date(a)).forEach(date=>{
    html+=`<div class="tx-glbl">${fmtD(date)}</div>`;
    groups[date].forEach(e=>{
      const idx=allSorted.findIndex(x=>x.id===e.id);
      let ch='';
      if(idx>0){const p=allSorted[idx-1],d=e.km-p.km;if(d>0){const c=(e.liters/d*100).toFixed(1);ch=`<span class="badge ${c>10?'b-bad':'b-ok'}">${c} L/100</span>`;}}
      html+=`<div class="entry">
        <div class="eicon">⛽</div>
        <div class="einfo">
          <div class="elabel">${e.desc||e.fuelType||'Plein'}</div>
          <div class="esub">${fmtN(e.km)} km · ${e.liters} L · ${fmtN(e.pricePerLiter)} F/L ${e.station?'· '+e.station:''}</div>
          <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
            <span class="badge b-fuel">${e.fuelType}</span>${ch}${e.note?`<span class="badge b-st">${e.note}</span>`:''}
          </div>
        </div>
        <div class="eright">
          <div class="eamt">${fmtN(Math.round(e.total))}</div>
          <div style="font-size:9px;color:var(--txt3)">FCFA</div>
        </div>
        <button class="edel" onclick="deleteEntry(${e.id})">🗑</button>
      </div>`;
    });
  });

  html+=`<div class="card" style="margin-top:12px">

function renderStats(){
  const ents=cEntries();const consos=getConsos(ents);
  const sorted=[...ents].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(consos.length<2){document.getElementById('tab-stats').innerHTML='<div class="empty"><div class="empty-icon">📈</div><div>Ajoutez au moins 2 pleins</div></div>';return;}
  const months6=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months6.push(d.toISOString().substring(0,7));}
  const maxMV=Math.max(...months6.map(m=>ents.filter(e=>e.date.startsWith(m)).reduce((s,e)=>s+e.total,0)),1);
  const last10c=consos.slice(-10),maxC=Math.max(...last10c.map(c=>c.conso),1);
  const consoBar=last10c.map(c=>`<div class="bc"><div class="bl">${c.conso.toFixed(1)}</div><div class="bi" style="height:${Math.max(3,(c.conso/maxC)*70)}px;background:${c.conso>10?'var(--red)':'var(--acc)'}"></div><div class="bd">${new Date(c.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})}</div></div>`).join('');
  const mthBar=months6.map(m=>{const v=ents.filter(e=>e.date.startsWith(m)).reduce((s,e)=>s+e.total,0);return`<div class="bc"><div class="bl">${Math.round(v/1000)}k</div><div class="bi" style="height:${Math.max(3,(v/maxMV)*70)}px;background:linear-gradient(135deg,var(--acc),var(--acc2))"></div><div class="bd">${m.substring(5)}</div></div>`;}).join('');
  const minC=Math.min(...consos.map(c=>c.conso)),maxConso=Math.max(...consos.map(c=>c.conso));
  const minP=Math.min(...ents.map(e=>e.pricePerLiter)),maxP=Math.max(...ents.map(e=>e.pricePerLiter));
  const totalCost=ents.reduce((s,e)=>s+e.total,0);
  const dist=sorted.length>1?sorted[sorted.length-1].km-sorted[0].km:0;
  const coutKm=dist>0?(totalCost/dist).toFixed(1):0;

  document.getElementById('tab-stats').innerHTML=`
    <div class="card"><div class="card-lbl">Consommation L/100km</div><div class="chart-wrap"><div class="bar-chart">${consoBar}</div></div></div>
    <div class="card"><div class="card-lbl">Dépenses mensuelles (FCFA)</div><div class="chart-wrap"><div class="bar-chart">${mthBar}</div></div></div>
    <div class="card">
      <div class="card-lbl">Résumé complet</div>
      <div class="srow"><span>Meilleure conso</span><span class="mono" style="color:#7dca7d">${minC.toFixed(1)} L/100</span></div>
      <div class="srow"><span>Pire conso</span><span class="mono" style="color:var(--red)">${maxConso.toFixed(1)} L/100</span></div>
      <div class="srow"><span>Prix min/L</span><span class="mono" style="color:var(--blu)">${fmtN(minP)} FCFA</span></div>
      <div class="srow"><span>Prix max/L</span><span class="mono" style="color:#f5a623">${fmtN(maxP)} FCFA</span></div>
      <div class="srow"><span>Coût/km</span><span class="mono" style="color:var(--pur)">${coutKm} FCFA/km</span></div>
      <div class="srow"><span>Nb pleins</span><span class="mono">${ents.length}</span></div>
      <div class="srow"><span>Total dépensé</span><span class="mono" style="color:var(--acc)">${fmtN(Math.round(totalCost))} FCFA</span></div>
    </div>
  `;
}

function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').slice(1).filter(l=>l.trim());
    let count=0;
    lines.forEach(line=>{
      const p=line.split(',');
      if(p.length>=6&&p[0]&&p[1]&&p[2]&&p[3]){
        const km=parseFloat(p[1]),liters=parseFloat(p[2]),price=parseFloat(p[3]),total=parseFloat(p[4]);
        if(km&&liters&&price){
          D.entries.push({id:Date.now()+count,vehId:curVeh,date:p[0].trim(),km,liters,pricePerLiter:price,total:total||liters*price,fuelType:p[5]?.trim()||'essence',station:p[6]?.trim()||'',note:p[7]?.trim()||''});
          count++;
        }
      }
    });
    persist();renderAll();showToast(`${count} entrées importées !`);
  };
  reader.readAsText(file);
}

// ============ GOOGLE DRIVE ============
const GDRIVE_CLIENT_ID='354411309659-ijlcjm2ojhu1vvd04rd7uokdofgs767u.apps.googleusercontent.com';
const GDRIVE_SCOPE='https://www.googleapis.com/auth/drive.file';
const GDRIVE_FILE='suivi_carburant_backup.json';

function gDriveAuth(){
  const redirect=encodeURIComponent(location.origin+location.pathname);
  const url=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${GDRIVE_CLIENT_ID}&redirect_uri=${redirect}&response_type=token&scope=${encodeURIComponent(GDRIVE_SCOPE)}&prompt=consent`;
  window.location.href=url;
}

function gDriveHandleToken(){
  const hash=window.location.hash;
  if(!hash.includes('access_token'))return;
  const params=new URLSearchParams(hash.replace('#',''));
  const token=params.get('access_token');
  if(token){
    D.gdriveToken=token;persist();
    window.history.replaceState(null,'',window.location.pathname);
    showToast('✅ Google Drive connecté !');
    updateGdriveStatus();
  }
}

function updateGdriveStatus(){
  const el=document.getElementById('gdrive-status');
  if(!el)return;
  if(D.gdriveToken){
    el.innerHTML='✅ Connecté — <a href="#" onclick="gDriveSync();return false" style="color:var(--acc)">Sauvegarder maintenant</a> · <a href="#" onclick="gDriveRestore();return false" style="color:var(--blu)">Restaurer</a>';
  } else {
    el.textContent='Non connecté — cliquez pour connecter';
  }
}

async function gDriveSync(){
  if(!D.gdriveToken){showToast('Connectez Google Drive d\'abord','err');return;}
  showToast('Sauvegarde en cours...');
  try{
    // Search for existing file
    const search=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GDRIVE_FILE}'&spaces=drive&fields=files(id,name)`,{headers:{Authorization:'Bearer '+D.gdriveToken}});
    const sData=await search.json();
    const fileId=sData.files&&sData.files.length>0?sData.files[0].id:null;
    const content=JSON.stringify(D);
    const meta={name:GDRIVE_FILE,mimeType:'application/json'};
    let resp;
    if(fileId){
      // Update existing
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({mimeType:'application/json'})],{type:'application/json'}));
      form.append('file',new Blob([content],{type:'application/json'}));
      resp=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:'Bearer '+D.gdriveToken},body:form});
    } else {
      // Create new
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file',new Blob([content],{type:'application/json'}));
      resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+D.gdriveToken},body:form});
    }
    if(resp.ok){showToast('✅ Sauvegardé sur Google Drive !');}
    else{D.gdriveToken=null;persist();showToast('Erreur — reconnectez Drive','err');}
  }catch(e){showToast('Erreur réseau','err');}
}

async function gDriveRestore(){
  if(!D.gdriveToken){showToast('Connectez Google Drive d\'abord','err');return;}
  showToast('Restauration en cours...');
  try{
    const search=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GDRIVE_FILE}'&spaces=drive&fields=files(id,name)`,{headers:{Authorization:'Bearer '+D.gdriveToken}});
    const sData=await search.json();
    if(!sData.files||sData.files.length===0){showToast('Aucune sauvegarde trouvée','err');return;}
    const fileId=sData.files[0].id;
    const resp=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+D.gdriveToken}});
    if(resp.ok){
      const restored=await resp.json();
      if(restored.vehicles&&restored.entries){
        D=restored;persist();renderVBar();renderAll();
        showToast('✅ Données restaurées depuis Drive !');
      }
    } else {showToast('Erreur de restauration','err');}
  }catch(e){showToast('Erreur réseau','err');}
}

// ============ TABS ============
function showTab(t){
  ['dashboard','history','stats','maint','journal'].forEach((id,i)=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active',id===t);
  });
  renderAll();
}
function renderAll(){renderDashboard();renderHistory();renderStats();renderMaint();renderJournal();}
function showToast(msg,type=''){const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400);}
