<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#e8a020"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Suivi Carburant"/>
<meta name="application-name" content="Suivi Carburant"/>
<link rel="manifest" href="/suivi-carburant/manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<title>Suivi Carburant</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c09;--s1:#111811;--s2:#161e16;--bdr:#1e2e1e;
  --acc:#e8a020;--acc2:#f5c842;--red:#e85050;--grn:#4caf50;
  --blu:#4fc3f7;--pur:#ce93d8;--txt:#f0ede8;--txt2:#8a9e8a;--txt3:#445544
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Sora',sans-serif;overflow-x:hidden}
.mono{font-family:'DM Mono',monospace}
#app{max-width:480px;margin:0 auto;padding:0 15px 100px}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;padding:22px 0 14px}
.h-eyebrow{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
.h-title{font-size:20px;font-weight:700}
.h-btns{display:flex;gap:7px}

/* VEHICLE BAR */
.vbar{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:3px}
.vbar::-webkit-scrollbar{display:none}
.vchip{flex-shrink:0;padding:7px 14px;border-radius:18px;font-size:11px;font-weight:600;border:1.5px solid var(--bdr);background:var(--s1);color:var(--txt2);cursor:pointer;white-space:nowrap;transition:all .2s}
.vchip.active{background:var(--acc);color:#000;border-color:var(--acc)}

/* SCORE */
.score-card{background:linear-gradient(135deg,#1a1200,#120e00);border:1px solid #3a2800;border-radius:16px;padding:15px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.score-label{font-size:10px;color:#8a7040;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.score-title{font-size:15px;font-weight:700}
.score-sub{font-size:11px;color:var(--txt2);margin-top:3px}
.score-circle{width:60px;height:60px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--acc);flex-shrink:0}
.score-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.score-max{font-size:9px;color:var(--txt3)}

/* ALERTS */
.alert{border-radius:12px;padding:11px 14px;margin-bottom:9px;display:flex;align-items:flex-start;gap:10px;font-size:12px}
.alert.warn{background:#1a1200;border:1px solid #4a3000;color:#f5c842}
.alert.danger{background:#1a0000;border:1px solid #4a0000;color:#ff7070}
.alert-icon{font-size:16px;flex-shrink:0}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:8px 2px;border-radius:8px;font-size:10px;font-weight:600;border:none;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;background:none;color:var(--txt3);white-space:nowrap}
.tab.active{background:var(--acc);color:#000}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:15px;margin-bottom:10px}
.card-lbl{font-size:9px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mini{background:var(--s2);border:1px solid var(--bdr);border-radius:11px;padding:13px}
.mini-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.mini-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.mini-unit{font-size:10px;color:var(--txt3);margin-top:1px}

/* FORECAST */
.forecast{background:linear-gradient(135deg,#001a14,#000f0a);border:1px solid #003a28;border-radius:14px;padding:15px;margin-bottom:10px}
.forecast-lbl{font-size:9px;color:#3a7a5a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.frow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #001a10;font-size:12px}
.frow:last-child{border:none;font-weight:700;font-size:13px;margin-top:4px}
.frow span:first-child{color:var(--txt2)}

/* ENTRIES */
.tx-glbl{font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px;padding-left:2px}
.entry{background:var(--s1);border:1px solid var(--bdr);border-radius:11px;padding:12px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.eicon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:rgba(232,160,32,.12)}
.einfo{flex:1;min-width:0}
.elabel{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esub{font-size:10px;color:var(--txt3);margin-top:2px}
.eamt{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--acc);text-align:right;white-space:nowrap}
.eamt-unit{font-size:9px;color:var(--txt3);text-align:right}
.edel{background:none;border:none;color:var(--txt3);font-size:14px;cursor:pointer;padding:2px 0 2px 7px;opacity:.4}
.edel:active{opacity:1;color:var(--red)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:16px;font-size:9px;font-weight:600}
.b-ok{background:#1a2a1a;color:#7dca7d;border:1px solid #2a4a2a}
.b-bad{background:#2a1a1a;color:var(--red);border:1px solid #4a2a2a}
.b-fuel{background:#1a1a2e;color:var(--pur);border:1px solid #2a2a45}
.b-st{background:var(--s2);color:var(--txt2);border:1px solid var(--bdr)}

/* CHARTS */
.chart-wrap{overflow-x:auto;padding-bottom:3px}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:85px;padding-top:18px;min-width:max-content}
.bc{flex:none;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:30px}
.bl{font-size:7px;color:var(--txt3);font-family:'DM Mono',monospace}
.bi{width:24px;border-radius:3px 3px 0 0;min-height:3px}
.bd{font-size:7px;color:var(--txt3);margin-top:2px}

/* STAT ROWS */
.srow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.srow:last-child{border:none}
.srow span:first-child{color:var(--txt2)}

/* MAINTENANCE */
.maint-card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.maint-icon{font-size:26px;flex-shrink:0;width:40px;height:40px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center}
.maint-info{flex:1}
.maint-title{font-size:13px;font-weight:600;margin-bottom:3px}
.maint-sub{font-size:11px;color:var(--txt2);margin-top:2px}
.ms{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0}
.ms-ok{background:#1a2a1a;color:#7dca7d}
.ms-warn{background:#2a1a00;color:#f5a623}
.ms-due{background:#2a0000;color:var(--red)}

/* JOURNAL */
.je{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:8px}
.je-header{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-bottom:5px}
.je-title{font-size:13px;font-weight:600;margin-bottom:3px}
.je-body{font-size:11px;color:var(--txt2);line-height:1.5}

/* BUTTONS */
.hbtn{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:9px;padding:7px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap}
.hbtn.acc{background:var(--acc);color:#000;border-color:var(--acc)}
.btn-p{background:var(--acc);color:#000;border:none;border-radius:9px;padding:12px;font-family:'Sora',sans-serif;font-weight:700;font-size:13px;cursor:pointer;flex:2}
.btn-g{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:9px;padding:11px;font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;flex:1}
.btn-d{background:#1a0000;border:1px solid #4a0000;color:var(--red);border-radius:9px;padding:11px;font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;flex:1}
.btn-row{display:flex;gap:8px;margin-top:4px}
.btn-exp{flex:1;background:var(--s1);border:1px solid var(--bdr);color:var(--txt);border-radius:9px;padding:9px;font-family:'Sora',sans-serif;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}

/* FAB */
.fab{position:fixed;bottom:22px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--acc);border:none;font-size:24px;color:#000;cursor:pointer;box-shadow:0 4px 18px rgba(232,160,32,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.93)}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:15px;justify-content:center;align-items:flex-start}
.overlay.open{display:flex}
.fwrap{background:var(--s1);border:1px solid var(--bdr);border-radius:18px;padding:19px;width:100%;max-width:480px;margin:auto}
.ftitle{font-size:16px;font-weight:700;margin-bottom:15px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:600;letter-spacing:.04em}
input,select,textarea{background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:11px 12px;color:var(--txt);font-family:'Sora',sans-serif;font-size:13px;width:100%;outline:none;transition:border .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
input::placeholder,textarea::placeholder{color:var(--txt3)}
select option{background:var(--s1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.cat-btn{border:1.5px solid var(--bdr);border-radius:9px;padding:8px 4px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;background:var(--s2);color:var(--txt2);text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s}
.cat-btn .ci{font-size:16px;line-height:1}
.cat-btn.sel{border-color:var(--acc);background:rgba(232,160,32,.1);color:var(--acc)}

/* MONTH NAV */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mnav-lbl{font-size:14px;font-weight:700}
.mnav-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'Sora',sans-serif}
.export-row{display:flex;gap:7px;margin-bottom:12px}
.divider{height:1px;background:var(--bdr);margin:10px 0}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#1a2a1a;border:1px solid #3a7a3a;color:#7dca7d;padding:9px 18px;border-radius:9px;font-size:12px;z-index:999;animation:fadeIO 2.2s ease;white-space:nowrap;pointer-events:none}
.toast.err{background:#1a0000;border-color:#7a0000;color:#ff7070}
.empty{text-align:center;padding:40px 16px;color:var(--txt3)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.4}

@keyframes fadeIO{0%,100%{opacity:0}12%,82%{opacity:1}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="h-eyebrow">⛽ Suivi Carburant</div>
      <div class="h-title" id="veh-title">Mon Vehicule</div>
    </div>
    <div class="h-btns">
      <button class="hbtn" onclick="openVehForm()">+ Veh.</button>
      <button class="hbtn" onclick="openSettings()">⚙</button>
    </div>
  </div>

  <div class="vbar" id="vbar"></div>
  <div class="score-card" id="score-card" style="display:none">
    <div>
      <div class="score-label">Score budget</div>
      <div class="score-title" id="score-title">--</div>
      <div class="score-sub" id="score-sub">--</div>
    </div>
    <div class="score-circle" id="score-circle">
      <div class="score-num" id="score-num">--</div>
      <div class="score-max">/100</div>
    </div>
  </div>
  <div id="alerts-zone"></div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('dashboard')">Tableau</button>
    <button class="tab" onclick="showTab('history')">Historique</button>
    <button class="tab" onclick="showTab('stats')">Stats</button>
    <button class="tab" onclick="showTab('maint')">Entretien</button>
    <button class="tab" onclick="showTab('journal')">Journal</button>
  </div>

  <div id="tab-dashboard"></div>
  <div id="tab-history" style="display:none"></div>
  <div id="tab-stats" style="display:none"></div>
  <div id="tab-maint" style="display:none"></div>
  <div id="tab-journal" style="display:none"></div>
</div>

<button class="fab" onclick="openEntryForm()">+</button>

<!-- ENTRY FORM -->
<div class="overlay" id="entry-overlay">
  <div class="fwrap">
    <div class="ftitle">Nouveau plein</div>
    <div class="cat-grid" id="fuel-cats">
      <button class="cat-btn sel" data-cat="essence" onclick="selCat('essence')"><span class="ci">⛽</span>Essence</button>
      <button class="cat-btn" data-cat="diesel" onclick="selCat('diesel')"><span class="ci">🛢</span>Diesel</button>
      <button class="cat-btn" data-cat="sp95" onclick="selCat('sp95')"><span class="ci">🔵</span>SP95</button>
      <button class="cat-btn" data-cat="sp98" onclick="selCat('sp98')"><span class="ci">🟣</span>SP98</button>
      <button class="cat-btn" data-cat="gpl" onclick="selCat('gpl')"><span class="ci">🟢</span>GPL</button>
      <button class="cat-btn" data-cat="autre" onclick="selCat('autre')"><span class="ci">🔧</span>Autre</button>
    </div>
    <div class="frow">
      <div class="fg"><label>Date</label><input type="date" id="f-date"/></div>
      <div class="fg"><label>Kilometrage (km)</label><input type="number" id="f-km" placeholder="45230" class="mono"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Litres</label><input type="number" id="f-liters" placeholder="40.5" class="mono" oninput="updPrev()"/></div>
      <div class="fg"><label>Prix/L (FCFA)</label><input type="number" id="f-price" placeholder="755" class="mono" oninput="updPrev()"/></div>
    </div>
    <div class="fg"><label>Station (optionnel)</label><input type="text" id="f-station" placeholder="Total Dakar"/></div>
    <div class="fg"><label>Note (optionnel)</label><input type="text" id="f-note" placeholder="Plein complet..."/></div>
    <div id="f-prev" style="display:none;background:var(--s2);border-radius:8px;padding:9px 12px;margin-bottom:11px;justify-content:space-between;font-size:12px">
      <span style="color:var(--txt2)">Total estimé</span>
      <span class="mono" style="color:var(--acc);font-weight:700" id="f-prev-val"></span>
    </div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeOvl('entry-overlay')">Annuler</button>
      <button class="btn-p" onclick="saveEntry()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- VEHICLE FORM -->
<div class="overlay" id="veh-overlay">
  <div class="fwrap">
    <div class="ftitle" id="vf-title">Ajouter un vehicule</div>
    <div class="fg"><label>Nom</label><input type="text" id="v-name" placeholder="Ma Voiture, Moto..."/></div>
    <div class="frow">
      <div class="fg"><label>Marque</label><input type="text" id="v-brand" placeholder="Toyota"/></div>
      <div class="fg"><label>Modele</label><input type="text" id="v-model" placeholder="Corolla 2020"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Immatriculation</label><input type="text" id="v-plate" placeholder="DK 1234 AB"/></div>
      <div class="fg"><label>Carburant défaut</label>
        <select id="v-fuel">
          <option value="essence">Essence</option><option value="diesel">Diesel</option>
          <option value="sp95">SP95</option><option value="sp98">SP98</option><option value="gpl">GPL</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label>Budget mensuel (FCFA)</label><input type="number" id="v-budget" placeholder="50000" class="mono"/></div>
      <div class="fg"><label>Conso cible (L/100km)</label><input type="number" id="v-conso" placeholder="8.0" class="mono"/></div>
    </div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeOvl('veh-overlay')">Annuler</button>
      <button class="btn-d" id="vf-del" onclick="delVeh()" style="display:none">Supprimer</button>
      <button class="btn-p" onclick="saveVeh()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="overlay" id="settings-overlay">
  <div class="fwrap">
    <div class="ftitle">Parametres</div>
    <div class="card-lbl" style="margin-bottom:8px;font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase">Google Drive Sync</div>
    <div id="gdrive-status" style="font-size:12px;color:var(--txt2);margin-bottom:10px">Non connecte</div>
    <button class="btn-p" style="width:100%;margin-bottom:12px" onclick="gDriveAuth()">Connecter Google Drive</button>
    <div class="divider"></div>
    <div class="card-lbl" style="margin:10px 0 8px;font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase">Import / Export</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn-g" style="flex:1" onclick="exportCSV()">📄 CSV</button>
      <button class="btn-g" style="flex:1" onclick="exportPDF()">📑 PDF</button>
    </div>
    <div class="fg"><label>Importer CSV</label><input type="file" id="s-csv" accept=".csv" onchange="importCSV(this)"/></div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn-p" onclick="closeOvl('settings-overlay')">Fermer</button>
    </div>
  </div>
</div>

<!-- MAINTENANCE FORM -->
<div class="overlay" id="maint-overlay">
  <div class="fwrap">
    <div class="ftitle">Nouvel entretien</div>
    <div class="fg"><label>Type</label>
      <select id="m-type">
        <option value="vidange">Vidange</option>
        <option value="visite">Visite technique</option>
        <option value="assurance">Assurance</option>
        <option value="pneu">Pneus</option>
        <option value="autre">Autre entretien</option>
      </select>
    </div>
    <div class="frow">
      <div class="fg"><label>Date dernier entretien</label><input type="date" id="m-last"/></div>
      <div class="fg"><label>Km au dernier entretien</label><input type="number" id="m-km" placeholder="44000" class="mono"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Prochain (date)</label><input type="date" id="m-next-date"/></div>
      <div class="fg"><label>Prochain (km)</label><input type="number" id="m-next-km" placeholder="49000" class="mono"/></div>
    </div>
    <div class="fg"><label>Cout (FCFA)</label><input type="number" id="m-cost" placeholder="25000" class="mono"/></div>
    <div class="fg"><label>Note</label><input type="text" id="m-note" placeholder="Garage, type huile..."/></div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeOvl('maint-overlay')">Annuler</button>
      <button class="btn-p" onclick="saveMaint()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- JOURNAL FORM -->
<div class="overlay" id="journal-overlay">
  <div class="fwrap">
    <div class="ftitle">Note journal</div>
    <div class="fg"><label>Date</label><input type="date" id="j-date"/></div>
    <div class="fg"><label>Titre</label><input type="text" id="j-title" placeholder="Observation, panne..."/></div>
    <div class="fg"><label>Details</label><textarea id="j-body" rows="4" placeholder="Description..."></textarea></div>
    <div class="btn-row">
      <button class="btn-g" onclick="closeOvl('journal-overlay')">Annuler</button>
      <button class="btn-p" onclick="saveJournal()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
// ===== DATA =====
const SK='fuel_v5';
let D={vehicles:[],entries:[],maints:[],journal:[],gdriveToken:null};
let curVeh=null,curMonth=new Date().toISOString().substring(0,7),selCatVal='essence',editVehId=null;

function load(){
  try{const s=localStorage.getItem(SK);if(s)D=JSON.parse(s);}catch(e){}
  if(!D.vehicles)D.vehicles=[];if(!D.entries)D.entries=[];
  if(!D.maints)D.maints=[];if(!D.journal)D.journal=[];
  if(D.vehicles.length===0){D.vehicles.push({id:Date.now(),name:'Mon Vehicule',brand:'',model:'',plate:'',fuel:'essence',budget:0,conso:0});persist();}
  curVeh=D.vehicles[0].id;
}
function persist(){localStorage.setItem(SK,JSON.stringify(D));}
function fN(n){return Math.abs(n).toLocaleString('fr-FR');}
function fD(d){return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
function cv(){return D.vehicles.find(v=>v.id===curVeh)||D.vehicles[0];}
function cE(){return D.entries.filter(e=>e.vehId===curVeh);}
function getConsos(ents){
  const s=[...ents].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const r=[];
  for(let i=1;i<s.length;i++){const p=s[i-1],c=s[i],d=c.km-p.km;if(d>0)r.push({...c,dist:d,conso:(c.liters/d)*100});}
  return r;
}

// ===== SCORE =====
function renderScore(){
  const ents=cE();const consos=getConsos(ents);
  if(consos.length<2){document.getElementById('score-card').style.display='none';return;}
  const v=cv();const avg=consos.reduce((s,c)=>s+c.conso,0)/consos.length;
  const target=v.conso||9;const bgt=v.budget||0;
  const now=new Date().toISOString().substring(0,7);
  const spent=ents.filter(e=>e.date.startsWith(now)).reduce((s,e)=>s+e.total,0);
  let sc=100;
  if(avg>target*1.3)sc-=40;else if(avg>target*1.1)sc-=20;
  if(bgt>0){const r=spent/bgt;if(r>1.2)sc-=30;else if(r>1)sc-=15;}
  sc=Math.max(0,Math.min(100,Math.round(sc)));
  document.getElementById('score-card').style.display='flex';
  document.getElementById('score-num').textContent=sc;
  let title,sub,color;
  if(sc>=85){title='Excellent ✨';sub='Consommation optimale';color='#7dca7d';}
  else if(sc>=65){title='Bon 👍';sub='Quelques ameliorations';color='var(--acc)';}
  else if(sc>=40){title='Moyen ⚠️';sub='Budget ou conso eleves';color='#f5a623';}
  else{title='Critique 🔴';sub='Budget depasse';color='var(--red)';}
  document.getElementById('score-title').textContent=title;
  document.getElementById('score-sub').textContent=sub;
  document.getElementById('score-circle').style.borderColor=color;
  document.getElementById('score-num').style.color=color;
}

// ===== ALERTS =====
function renderAlerts(){
  const alerts=[];const v=cv();const ents=cE();
  const now=new Date().toISOString().substring(0,7);
  const today=new Date().toISOString().split('T')[0];
  const mSpent=ents.filter(e=>e.date.startsWith(now)).reduce((s,e)=>s+e.total,0);
  if(v.budget>0&&mSpent>v.budget*0.9)
    alerts.push({type:mSpent>v.budget?'danger':'warn',icon:'💰',
      msg:mSpent>v.budget?`Budget depasse ! ${fN(mSpent)} / ${fN(v.budget)} FCFA`:`Budget a ${Math.round(mSpent/v.budget*100)}% — ${fN(v.budget-mSpent)} FCFA restants`});
  D.maints.filter(m=>m.vehId===curVeh).forEach(m=>{
    if(m.nextDate&&m.nextDate<=today)alerts.push({type:'danger',icon:'🔧',msg:`${ML[m.type]||m.type} : echeance depassee !`});
    else if(m.nextDate){const diff=(new Date(m.nextDate)-new Date())/(864e5);if(diff<=30)alerts.push({type:'warn',icon:'⚠️',msg:`${ML[m.type]||m.type} dans ${Math.round(diff)} jours`});}
  });
  const consos=getConsos(ents);
  if(consos.length>0){const avg=consos.slice(-3).reduce((s,c)=>s+c.conso,0)/Math.min(3,consos.length);
    if(avg>12)alerts.push({type:'warn',icon:'⛽',msg:`Conso elevee : ${avg.toFixed(1)} L/100km`});}
  document.getElementById('alerts-zone').innerHTML=alerts.slice(0,3)
    .map(a=>`<div class="alert ${a.type}"><span class="alert-icon">${a.icon}</span><span>${a.msg}</span></div>`).join('');
}

  const moLbl=new Date(yr,mo-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  let html=`
    <div class="export-row">

          <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">

        </div>

        </div>
        <button class="edel" onclick="delEntry(${e.id})">🗑</button>

    <div class="card-lbl">Bilan ${moLbl}</div>
    <div class="srow"><span>Total depense</span><span class="mono" style="color:var(--acc)">${fN(Math.round(mT))} FCFA</span></div>
    <div class="srow"><span>Litres</span><span class="mono">${mL.toFixed(1)} L</span></div>
    <div class="srow"><span>Nb pleins</span><span class="mono">${ents.length}</span></div>
    ${cv().budget>0?`<div class="srow"><span>Budget mensuel</span><span class="mono">${fN(cv().budget)} FCFA</span></div>
    <div class="srow"><span>Reste budget</span><span class="mono" style="color:${cv().budget-mT>=0?'#7dca7d':'var(--red)'}">${fN(Math.abs(cv().budget-mT))} FCFA ${cv().budget-mT>=0?'restants':'depasses'}</span></div>`:''}
  </div>`;
  document.getElementById('tab-history').innerHTML=html;
}
function prevMonth(){const[yr,mo]=curMonth.split('-').map(Number);curMonth=new Date(yr,mo-2,1).toISOString().substring(0,7);renderHistory();}
function nextMonth(){const[yr,mo]=curMonth.split('-').map(Number);curMonth=new Date(yr,mo,1).toISOString().substring(0,7);renderHistory();}

// ===== STATS =====
function renderStats(){
  const ents=cE();const consos=getConsos(ents);
  if(consos.length<2){document.getElementById('tab-stats').innerHTML='<div class="empty"><div class="empty-icon">📈</div><div>Ajoutez au moins 2 pleins</div></div>';return;}
  const months6=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months6.push(d.toISOString().substring(0,7));}
  const maxMV=Math.max(...months6.map(m=>ents.filter(e=>e.date.startsWith(m)).reduce((s,e)=>s+e.total,0)),1);
  const last10=consos.slice(-10),maxC=Math.max(...last10.map(c=>c.conso),1);
  const cBar=last10.map(c=>`<div class="bc"><div class="bl">${c.conso.toFixed(1)}</div><div class="bi" style="height:${Math.max(3,(c.conso/maxC)*70)}px;background:${c.conso>10?'var(--red)':'var(--acc)'}"></div><div class="bd">${new Date(c.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})}</div></div>`).join('');
  const mBar=months6.map(m=>{const v=ents.filter(e=>e.date.startsWith(m)).reduce((s,e)=>s+e.total,0);return`<div class="bc"><div class="bl">${Math.round(v/1000)}k</div><div class="bi" style="height:${Math.max(3,(v/maxMV)*70)}px;background:linear-gradient(135deg,var(--acc),var(--acc2))"></div><div class="bd">${m.substring(5)}</div></div>`;}).join('');
  const minC=Math.min(...consos.map(c=>c.conso)),maxConso=Math.max(...consos.map(c=>c.conso));
  const minP=Math.min(...ents.map(e=>e.pricePerLiter)),maxP=Math.max(...ents.map(e=>e.pricePerLiter));
  const sorted=[...ents].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const dist=sorted.length>1?sorted[sorted.length-1].km-sorted[0].km:0;
  const totalC=ents.reduce((s,e)=>s+e.total,0);
  document.getElementById('tab-stats').innerHTML=`
    <div class="card"><div class="card-lbl">Consommation L/100km</div><div class="chart-wrap"><div class="bar-chart">${cBar}</div></div></div>
    <div class="card"><div class="card-lbl">Depenses mensuelles (FCFA)</div><div class="chart-wrap"><div class="bar-chart">${mBar}</div></div></div>
    <div class="card">
      <div class="card-lbl">Resume</div>
      <div class="srow"><span>Meilleure conso</span><span class="mono" style="color:#7dca7d">${minC.toFixed(1)} L/100</span></div>
      <div class="srow"><span>Pire conso</span><span class="mono" style="color:var(--red)">${maxConso.toFixed(1)} L/100</span></div>
      <div class="srow"><span>Prix min/L</span><span class="mono" style="color:var(--blu)">${fN(minP)} FCFA</span></div>
      <div class="srow"><span>Prix max/L</span><span class="mono" style="color:#f5a623">${fN(maxP)} FCFA</span></div>
      <div class="srow"><span>Cout/km</span><span class="mono" style="color:var(--pur)">${dist>0?(totalC/dist).toFixed(1):0} FCFA/km</span></div>
      <div class="srow"><span>Total</span><span class="mono" style="color:var(--acc)">${fN(Math.round(totalC))} FCFA</span></div>
    </div>`;
}

const ML={vidange:'🔧 Vidange',visite:'🔍 Visite technique',assurance:'🛡 Assurance',pneu:'🔵 Pneus',autre:'📌 Entretien'};
function renderMaint(){
  const maints=D.maints.filter(m=>m.vehId===curVeh).sort((a,b)=>new Date(b.lastDate)-new Date(a.lastDate));
  const today=new Date().toISOString().split('T')[0];
  const lastKm=cE().length?Math.max(...cE().map(e=>e.km)):0;
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:13px;font-weight:600">Entretiens & Suivi</span>
    <button class="hbtn acc" onclick="openMaintForm()">+ Ajouter</button>
  </div>`;
  if(!maints.length){html+='<div class="empty"><div class="empty-icon">🔧</div><div>Aucun entretien enregistre</div></div>';
    document.getElementById('tab-maint').innerHTML=html;return;}
  maints.forEach(m=>{
    let st='ok',sl='A jour';
    if(m.nextDate&&m.nextDate<=today){st='due';sl='ECHU';}
    else if(m.nextDate){const diff=(new Date(m.nextDate)-new Date())/864e5;if(diff<=30){st='warn';sl=Math.round(diff)+'j';}}
    else if(m.nextKm&&lastKm>=m.nextKm){st='due';sl='ECHU';}
    else if(m.nextKm&&lastKm>=m.nextKm-500){st='warn';sl=fN(m.nextKm-lastKm)+' km';}
    const icon=ML[m.type]?.split(' ')[0]||'🔧';
    const lbl=ML[m.type]?.substring(2)||m.type;
    html+=`<div class="maint-card">
      <div class="maint-icon">${icon}</div>
      <div class="maint-info">
        <div class="maint-title">${lbl}</div>
        <div class="maint-sub">Dernier : ${m.lastDate?fD(m.lastDate):'--'}${m.lastKm?' · '+fN(m.lastKm)+' km':''}</div>
        ${m.nextDate?`<div class="maint-sub">Prochain : ${fD(m.nextDate)}</div>`:''}
        ${m.nextKm?`<div class="maint-sub">Prochain km : ${fN(m.nextKm)}</div>`:''}
        ${m.cost?`<div class="maint-sub">Cout : ${fN(m.cost)} FCFA</div>`:''}
        ${m.note?`<div class="maint-sub">${m.note}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span class="ms ms-${st}">${sl}</span>
        <button class="edel" onclick="delMaint(${m.id})">🗑</button>
      </div>
    </div>`;
  });
  document.getElementById('tab-maint').innerHTML=html;
}

function saveVeh(){

function delVeh(){

// ===== EXPORT / IMPORT =====
function exportCSV(){
  const ents=cE().sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!ents.length){showToast('Aucune donnee','err');return;}
  let csv='Date,Km,Litres,Prix/L,Total,Carburant,Station,Note\n';
  ents.forEach(e=>{csv+=`${e.date},${e.km},${e.liters},${e.pricePerLiter},${Math.round(e.total)},${e.fuelType},${e.station||''},${e.note||''}\n`;});
  dl(new Blob([csv],{type:'text/csv;charset=utf-8;'}),`carburant_${cv().name}_${new Date().toISOString().split('T')[0]}.csv`);
  showToast('CSV exporte !');
}
function exportPDF(){
  const ents=cE().sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!ents.length){showToast('Aucune donnee','err');return;}
  const v=cv(),tot=ents.reduce((s,e)=>s+e.total,0),lit=ents.reduce((s,e)=>s+e.liters,0);
  const consos=getConsos(ents),avgC=consos.length?consos.reduce((s,c)=>s+c.conso,0)/consos.length:null;
  const dist=ents.length>1?ents[ents.length-1].km-ents[0].km:0;
  const rows=ents.map(e=>`<tr><td>${fD(e.date)}</td><td>${fN(e.km)}</td><td>${e.liters}</td><td>${fN(e.pricePerLiter)}</td><td><b>${fN(Math.round(e.total))}</b></td><td>${e.fuelType}</td><td>${e.station||'-'}</td></tr>`).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Suivi Carburant</title><style>body{font-family:Arial,sans-serif;padding:30px;font-size:13px}h1{color:#e8a020}.stats{display:flex;gap:14px;margin:16px 0;flex-wrap:wrap}.s{background:#f5f5f5;border-radius:8px;padding:12px 16px}.sl{font-size:10px;color:#888;text-transform:uppercase}.sv{font-size:18px;font-weight:bold;color:#e8a020}table{width:100%;border-collapse:collapse;margin-top:16px}th{background:#e8a020;color:#fff;padding:8px;text-align:left}td{padding:7px 8px;border-bottom:1px solid #eee}</style></head><body><h1>Suivi Carburant — ${v.name}</h1><p style="color:#888;font-size:12px">${v.brand} ${v.model} ${v.plate} · ${new Date().toLocaleDateString('fr-FR')}</p><div class="stats"><div class="s"><div class="sl">Total</div><div class="sv">${fN(Math.round(tot))} FCFA</div></div><div class="s"><div class="sl">Litres</div><div class="sv">${lit.toFixed(1)} L</div></div><div class="s"><div class="sl">Distance</div><div class="sv">${fN(dist)} km</div></div><div class="s"><div class="sl">Conso moy.</div><div class="sv">${avgC?avgC.toFixed(1):'--'} L/100</div></div><div class="s"><div class="sl">Nb pleins</div><div class="sv">${ents.length}</div></div></div><table><tr><th>Date</th><th>Km</th><th>Litres</th><th>Prix/L</th><th>Total FCFA</th><th>Carburant</th><th>Station</th></tr>${rows}</table></body></html>`;
  dl(new Blob([html],{type:'text/html;charset=utf-8;'}),`carburant_${v.name}_${new Date().toISOString().split('T')[0]}.html`);
  showToast('Ouvre le fichier et imprime en PDF !');
}
function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').slice(1).filter(l=>l.trim());
    let count=0;
    lines.forEach(line=>{
      const p=line.split(',');
      if(p.length>=5&&p[0]&&p[1]){
        const km=parseFloat(p[1]),liters=parseFloat(p[2]),price=parseFloat(p[3]),total=parseFloat(p[4]);
        if(km&&liters&&price){
          D.entries.push({id:Date.now()+count,vehId:curVeh,date:p[0].trim(),km,liters,pricePerLiter:price,
            total:total||liters*price,fuelType:p[5]?.trim()||'essence',station:p[6]?.trim()||'',note:p[7]?.trim()||''});
          count++;
        }
      }
    });
    persist();renderAll();showToast(count+' entrees importees !');
  };
  reader.readAsText(file);
}
function dl(blob,name){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);}

// ===== GOOGLE DRIVE =====
const GID='354411309659-ijlcjm2ojhu1vvd04rd7uokdofgs767u.apps.googleusercontent.com';
const GFILE='suivi_carburant_backup.json';
function gDriveAuth(){
  const redirect=encodeURIComponent(location.origin+location.pathname);
  location.href=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${GID}&redirect_uri=${redirect}&response_type=token&scope=${encodeURIComponent('https://www.googleapis.com/auth/drive.file')}&prompt=consent`;
}
function gDriveHandleToken(){
  if(!location.hash.includes('access_token'))return;
  const params=new URLSearchParams(location.hash.replace('#',''));
  const token=params.get('access_token');
  if(token){D.gdriveToken=token;persist();history.replaceState(null,'',location.pathname);showToast('Google Drive connecte !');}
}
async function gDriveSync(){
  if(!D.gdriveToken){showToast('Connectez Google Drive','err');return;}
  try{
    const s=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GFILE}'&fields=files(id)`,{headers:{Authorization:'Bearer '+D.gdriveToken}});
    const sd=await s.json();const fid=sd.files?.[0]?.id;
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify({name:GFILE,mimeType:'application/json'})],{type:'application/json'}));
    form.append('file',new Blob([JSON.stringify(D)],{type:'application/json'}));
    const url=fid?`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=multipart`:'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const r=await fetch(url,{method:fid?'PATCH':'POST',headers:{Authorization:'Bearer '+D.gdriveToken},body:form});
    if(r.ok)showToast('Sauvegarde sur Google Drive !');
    else{D.gdriveToken=null;persist();showToast('Erreur Drive — reconnectez','err');}
  }catch(e){showToast('Erreur reseau','err');}
}
async function gDriveRestore(){
  if(!D.gdriveToken){showToast('Connectez Google Drive','err');return;}
  try{
    const s=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GFILE}'&fields=files(id)`,{headers:{Authorization:'Bearer '+D.gdriveToken}});
    const sd=await s.json();const fid=sd.files?.[0]?.id;
    if(!fid){showToast('Aucune sauvegarde trouvee','err');return;}
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`,{headers:{Authorization:'Bearer '+D.gdriveToken}});
    if(r.ok){const restored=await r.json();if(restored.vehicles){D=restored;persist();renderVBar();renderAll();showToast('Donnees restaurees !');}}
    else showToast('Erreur de restauration','err');
  }catch(e){showToast('Erreur reseau','err');}
}
